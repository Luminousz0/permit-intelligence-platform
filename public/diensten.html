                    </ul>
                  </div>
                  <div style={{ padding: 24, border: "1px solid var(--hairline)", borderRadius: 8, background: "var(--bg)" }}>
                    <div className="mono small" style={{ color: "var(--mute)", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>

                    </div>
                    <div style={{ fontFamily: "var(--serif)", fontSize: 28, marginBottom: 4 }}>€950</div>
                    <div className="mono small" style={{ color: "var(--mute)", marginBottom: 12 }}>
                      {lang === "en" ? "per dossier" : "per dossier"}
                    </div>
                    <ul style={{ paddingLeft: 18, fontSize: 15, color: "var(--ink-soft)", lineHeight: 1.7 }}>
                      <li>{lang === "en" ? "Full participation documentation review" : "Volledige beoordeling participatiedocumentatie"}</li>
                      <li>{lang === "en" ? "Pre-submission compliance check" : "Pre-submission compliance check"}</li>
                      <li>{lang === "en" ? "Vooroverleg coordination if needed" : "Vooroverleg-begeleiding waar nodig"}</li>
                      <li>{lang === "en" ? "Hand-off ready for submission" : "Direct in te dienen na overdracht"}</li>
                    </ul>
                  </div>

                <div style={{ marginTop: 24 }}>

                    type="button"
                    className="btn btn-primary"
                    style={{ background: accent.bg, color: accent.fg }}
                    onClick={() => {
                      if (window.openCalendly) window.openCalendly("diensten");
                      if (window.trackEvent) window.trackEvent("demo_cta_click", "conversion", "diensten");
                    }}
                  >
                    {lang === "en" ? "Schedule a call" : "Plan een gesprek"} <span className="arrow">→</span>
                  </button>
                </div>
              </div>
            </div>
          </section>

          <SubFooter t={t} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<ServicesPage />);
  </script>
