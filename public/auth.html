<!-- Login Modal -->
<div id="auth-modal" class="modal-overlay" style="display:none;">
  <div class="modal-content" style="max-width:400px;">
    <h3 id="auth-title">Login</h3>
    <form id="auth-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="auth-email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="auth-password" required minlength="6">
      </div>
      <button type="submit" class="btn" id="auth-submit">Login</button>
    </form>
    <p style="text-align:center; margin-top:1rem;">
      <a href="#" id="toggle-auth-mode">Need an account? Sign up</a>
    </p>
    <button class="btn" style="background:transparent; color:var(--text-primary); margin-top:0.5rem;" id="auth-close">Cancel</button>
  </div>
</div>

<!-- Language Switcher (add to header) -->
<div class="lang-switcher">
  <button class="lang-btn" data-lang="en">EN</button>
  <span style="color:var(--text-tertiary);">|</span>
  <button class="lang-btn" data-lang="nl">NL</button>
</div>
