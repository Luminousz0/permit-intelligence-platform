<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gemeentendatabase — Permit Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="styles-pages.css" />
  <script src="theme-manager.js"></script>
  <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-740YX0W0GE"></script>
  <script src="config.js"></script>
  <script src="analytics.js"></script>
  <script async src="https://assets.calendly.com/assets/external/widget.js"></script>
  <style>
    .db-filter-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 32px;
      align-items: center;
    }
    .db-search {
      flex: 1;
      min-width: 200px;
    }
    .db-filter-btn {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 7px 14px;
      border: 1px solid var(--hairline);
      border-radius: 6px;
      background: transparent;
      color: var(--ink-soft);
      cursor: pointer;
      transition: all 0.15s;
    }
    .db-filter-btn:hover,
    .db-filter-btn.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
    .db-filter-btn.f-mandatory.active  { background: var(--green); border-color: var(--green); color: oklch(0.15 0.04 145); }
    .db-filter-btn.f-discretionary.active { background: var(--amber); border-color: var(--amber); color: oklch(0.3 0.06 75); }
    .db-filter-btn.f-voluntary.active  { background: var(--blue-soft); border-color: var(--blue-soft); color: oklch(0.3 0.05 250); }

    .db-table-wrap { overflow-x: auto; }
    .db-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .db-table th {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mute);
      text-align: left;
      padding: 12px 16px;
      border-bottom: 2px solid var(--hairline);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    .db-table th:hover { color: var(--ink); }
    .db-table th .sort-arrow { margin-left: 4px; opacity: 0.4; }
    .db-table th.sorted .sort-arrow { opacity: 1; }
    .db-table td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--hairline);
      vertical-align: top;
    }
    .db-table tr:last-child td { border-bottom: none; }
    .db-table tr:hover td { background: var(--bg-alt); }
    .db-table .city-name { font-weight: 500; color: var(--ink); }
    .db-table .trigger-text { color: var(--ink-soft); max-width: 240px; font-size: 13px; }
    .db-table .cvdr-link {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--blue);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .db-table .province-tag {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--mute);
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-family: var(--mono);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-mandatory    { background: var(--green); }
    .dot-discretionary { background: var(--amber); }
    .dot-voluntary    { background: var(--blue-soft); }
    .dot-unprofiled   { background: var(--gray-soft); }
    .db-count {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--mute);
      margin-bottom: 16px;
    }
    .db-cta-row {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 48px;
      padding: 32px;
      border: 1px solid var(--hairline);
      border-radius: 12px;
      background: var(--bg-alt);
    }
    .db-cta-text { flex: 1; }
    .db-cta-text strong { font-family: var(--serif); font-size: 18px; display: block; margin-bottom: 6px; }
    .db-cta-text p { font-size: 14px; color: var(--ink-soft); margin: 0; }
    @media (max-width: 768px) { .db-cta-row { flex-direction: column; } }
  </style>
</head>
<body data-aesthetic="hybrid">

      { name: "Westland",      province: "Zuid-Holland", status: "discretionary", framework: "discretionary",  trigger: "Per geval beoordeeld",                        cvdr: "CVDR687291", pop: 111000, updated: "Jan 2024" },

      // reconciled from JSON database
      { name: "'s-Hertogenbosch", province: "Noord-Brabant", status: "mandatory",  framework: "process-based",  trigger: "Alle BOPA-aanvragen (omgevingsdialoog)",       cvdr: "CVDR694802", pop: 160000, updated: "Mrt 2026" },

      { name: "Roosendaal",    province: "Noord-Brabant", status: "mandatory",    framework: "binary-list",    trigger: "≥3 woningen of >500 m²",                      cvdr: "CVDR700182", pop: 77000,  updated: "Jan 2026" },
      { name: "Lelystad",      province: "Flevoland",    status: "discretionary", framework: "discretionary",  trigger: "Per geval beoordeeld",                         cvdr: "CVDR696745", pop: 82000,  updated: "Nov 2025" },
      { name: "Purmerend",     province: "Noord-Holland", status: "mandatory",    framework: "binary-list",    trigger: "≥4 woningen of >600 m²",                      cvdr: "CVDR702847", pop: 85000,  updated: "Feb 2026" },
      { name: "Hoorn",         province: "Noord-Holland", status: "voluntary",    framework: "voluntary",      trigger: "Aanbevolen, niet vereist",                     cvdr: "CVDR694007", pop: 73000,  updated: "Okt 2025" },
      { name: "Nissewaard",    province: "Zuid-Holland", status: "voluntary",     framework: "voluntary",      trigger: "Aanbevolen, niet vereist",                     cvdr: "CVDR692304", pop: 86000,  updated: "Okt 2025" },
    ];

    const FRAMEWORK_LABELS = {
      "blanket":       "Algeheel verplicht",
      "binary-list":   "Activiteitenlijst",
      "impact-scoring":"Impactscore",
      "process-based": "Procesverplicht",
      "discretionary": "Beoordelingsruimte",
      "voluntary":     "Vrijwillig",
    };

    const STATUS_LABELS = {
      mandatory:     "Verplicht",
      discretionary: "Beoordelingsruimte",
      voluntary:     "Vrijwillig",
    };

    function StatusBadge({ status }) {
      return (
        <span className="status-badge">
          <span className={`status-dot dot-${status}`}></span>
          {STATUS_LABELS[status] || status}
        </span>
      );
    }

    function GemeentenPage() {
      const [lang, setLang] = useState("nl");
      const [query, setQuery] = useState("");
      const [statusFilter, setStatusFilter] = useState("all");
      const [sortKey, setSortKey] = useState("name");
      const [sortAsc, setSortAsc] = useState(true);
      const t = window.COPY[lang];
      const accent = window.ACCENT_PRESETS_S.blue;

      const filtered = useMemo(() => {
        let rows = DB;
        if (query.trim()) {
          const q = query.trim().toLowerCase();
          rows = rows.filter(r =>
            r.name.toLowerCase().includes(q) || r.province.toLowerCase().includes(q)
          );
        }
        if (statusFilter !== "all") {
          rows = rows.filter(r => r.status === statusFilter);
        }
        rows = [...rows].sort((a, b) => {
          const va = a[sortKey] ?? "";
          const vb = b[sortKey] ?? "";
          if (typeof va === "number") return sortAsc ? va - vb : vb - va;
          return sortAsc
            ? String(va).localeCompare(String(vb), "nl")
            : String(vb).localeCompare(String(va), "nl");
        });
        return rows;
      }, [query, statusFilter, sortKey, sortAsc]);

      const toggleSort = (key) => {
        if (sortKey === key) setSortAsc(!sortAsc);
        else { setSortKey(key); setSortAsc(true); }
      };

      const isNL = lang !== "en";

      const breadcrumb = isNL
        ? [{ label: "Home", href: "index.html" }, { label: "Gemeentendatabase" }]
        : [{ label: "Home", href: "index.html" }, { label: "Municipality database" }];

      return (
        <>
          <SubNav lang={lang} setLang={setLang} current="gemeenten.html" accent={accent}
                  demoLabel={t.nav.demo} tryLabel={t.nav.tryTool} />
          <PageHeader
            breadcrumb={breadcrumb}
            eyebrow={isNL ? "Participatievereisten per gemeente" : "Participation requirements per municipality"}
            title={isNL ? "41 gemeenten in kaart gebracht." : "41 municipalities profiled."}
            sub={isNL
              ? "Elke regel gebaseerd op officieel gepubliceerd beleid via lokaleregelgeving.overheid.nl. Klik een gemeente aan om direct naar de tool te gaan."
              : "Every rule sourced from officially published policy on lokaleregelgeving.overheid.nl. Click a municipality to open it directly in the tool."}
          />

          <section style={{ padding: "0 0 clamp(64px, 9vw, 120px)" }}>
            <div className="container">
              {/* Filter bar */}
              <div className="db-filter-bar">
                <input
                  type="text"
                  className="field-input db-search"
                  placeholder={isNL ? "Zoek gemeente of provincie…" : "Search municipality or province…"}
                  value={query}
                  onChange={e => setQuery(e.target.value)}
                />
                {["all", "mandatory", "discretionary", "voluntary"].map(s => (
                  <button
                    key={s}
                    className={`db-filter-btn f-${s} ${statusFilter === s ? "active" : ""}`}
                    onClick={() => setStatusFilter(s)}
                  >
                    {s === "all"           ? (isNL ? "Alle" : "All")
                    : s === "mandatory"    ? (isNL ? "Verplicht" : "Mandatory")
                    : s === "discretionary"? (isNL ? "Beoordelingsruimte" : "Discretionary")
                    :                        (isNL ? "Vrijwillig" : "Voluntary")}
                  </button>
                ))}
              </div>

              <div className="db-count">
                {isNL
                  ? `${filtered.length} van ${DB.length} gemeenten getoond`
                  : `Showing ${filtered.length} of ${DB.length} municipalities`}
              </div>

              <div className="db-table-wrap">
                <table className="db-table">
                  <thead>
                    <tr>
                      <th onClick={() => toggleSort("name")} className={sortKey === "name" ? "sorted" : ""}>
                        {isNL ? "Gemeente" : "Municipality"} <span className="sort-arrow">{sortKey === "name" ? (sortAsc ? "↑" : "↓") : "↕"}</span>
                      </th>
                      <th onClick={() => toggleSort("province")} className={sortKey === "province" ? "sorted" : ""}>
                        {isNL ? "Provincie" : "Province"} <span className="sort-arrow">{sortKey === "province" ? (sortAsc ? "↑" : "↓") : "↕"}</span>
                      </th>
                      <th onClick={() => toggleSort("status")} className={sortKey === "status" ? "sorted" : ""}>
                        Status <span className="sort-arrow">{sortKey === "status" ? (sortAsc ? "↑" : "↓") : "↕"}</span>
                      </th>
                      <th>{isNL ? "Kader" : "Framework"}</th>
                      <th>{isNL ? "Trigger" : "Trigger"}</th>
                      <th>CVDR</th>
                      <th onClick={() => toggleSort("updated")} className={sortKey === "updated" ? "sorted" : ""}>
                        {isNL ? "Bijgewerkt" : "Updated"} <span className="sort-arrow">{sortKey === "updated" ? (sortAsc ? "↑" : "↓") : "↕"}</span>
                      </th>
                    </tr>
                  </thead>
                  <tbody>
                    {filtered.map((row) => (
                      <tr key={row.name}>
                        <td>
                          <a
                            className="city-name"
                            href={`tool.html?gemeente=${encodeURIComponent(row.name)}`}
                            style={{ color: "var(--ink)", borderBottom: "1px solid var(--hairline-strong)", paddingBottom: "1px" }}
                          >
                            {row.name}
                          </a>
                        </td>
                        <td><span className="province-tag">{row.province}</span></td>
                        <td><StatusBadge status={row.status} /></td>
                        <td style={{ fontSize: 13, color: "var(--ink-soft)" }}>{FRAMEWORK_LABELS[row.framework] || row.framework}</td>
                        <td><span className="trigger-text">{row.trigger}</span></td>
                        <td>
                          {row.cvdr ? (
                            <a
                              className="cvdr-link"
                              href={`https://lokaleregelgeving.overheid.nl/CVDR/${row.cvdr.replace("CVDR","")}`}
                              target="_blank"
                              rel="noopener noreferrer"
                            >
                              {row.cvdr}
                            </a>
                          ) : <span style={{ color: "var(--mute)" }}>—</span>}
                        </td>
                        <td style={{ fontSize: 12, color: "var(--mute)", fontFamily: "var(--mono)" }}>{row.updated}</td>
                      </tr>
                    ))}
                    {filtered.length === 0 && (
                      <tr>
                        <td colSpan={7} style={{ textAlign: "center", color: "var(--mute)", padding: "40px 16px" }}>
                          {isNL ? "Geen resultaten voor deze zoekopdracht." : "No results for this search."}
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>

              {/* Bottom CTA */}
              <div className="db-cta-row">
                <div className="db-cta-text">
                  <strong className="serif">{isNL ? "Gemeente staat er niet bij?" : "Municipality not listed?"}</strong>
                  <p>{isNL
                    ? "We breiden de database voortdurend uit. Voor niet-geprofileerde gemeenten is gerichte consultatie beschikbaar — wij doen het beleidsonderzoek."
                    : "We're continuously expanding the database. For unprofiled municipalities, targeted consultancy is available — we do the policy research."}</p>
                </div>
                <button
                  type="button"
                  className="btn btn-primary"
                  style={{ background: accent.bg, color: accent.fg, flexShrink: 0 }}
                  onClick={() => {
                    if (window.openCalendly) window.openCalendly("gemeenten");
                    if (window.trackEvent) window.trackEvent("demo_cta_click", "conversion", "gemeenten");
                  }}
                >
                  {isNL ? "Plan consultatie" : "Schedule consultation"} <span className="arrow">→</span>
                </button>
              </div>

              <p style={{ marginTop: 24, fontSize: 12, color: "var(--mute)", fontFamily: "var(--mono)" }}>
                {isNL
                  ? "Bron: lokaleregelgeving.overheid.nl · gemeente.overheid.nl · parolo.nl · Per april 2026. Gebruikers blijven verantwoordelijk voor bevestiging bij de gemeente vóór indiening."
                  : "Source: lokaleregelgeving.overheid.nl · gemeente.overheid.nl · parolo.nl · As of April 2026. Users remain responsible for confirming requirements with their municipality before submission."}
