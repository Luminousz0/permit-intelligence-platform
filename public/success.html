<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Betaling geslaagd — Permit Intelligence</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .success-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .success-card {
      background: var(--bg);
      border: 1.5px solid var(--hairline-strong);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .success-icon {
      font-size: 48px;
      margin-bottom: 20px;
    }
    .success-card h1 {
      font-size: 26px;
      font-weight: 700;
      margin: 0 0 12px;
    }
    .success-card p {
      color: var(--ink-muted);
      font-size: 16px;
      line-height: 1.6;
      margin: 0 0 28px;
    }
    .success-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .btn-success {
      display: inline-block;
      padding: 14px 24px;
      background: #111;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
    }
    .btn-secondary-link {
      display: inline-block;
      padding: 12px 24px;
      border: 1.5px solid var(--hairline-strong);
      border-radius: 8px;
      text-decoration: none;
      color: var(--ink);
      font-size: 15px;
    }
    .credit-badge {
      display: inline-block;
      background: #e8f5e9;
      color: #2e7d32;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div class="success-container">
    <div class="success-card">
      <div class="success-icon">✅</div>
      <div class="credit-badge" id="creditBadge">Rapport credit toegevoegd</div>
      <h1>Betaling geslaagd</h1>
      <p>
        Uw rapport credit is direct beschikbaar. Ga terug naar de tool en
        klik opnieuw op <strong>Genereer participatieverslag</strong> om uw
        gemeente-specifieke DOCX te downloaden.
      </p>
      <div class="success-actions">
        <a href="tool.html" class="btn-success">→ Ga naar de tool</a>
        <a href="index.html" class="btn-secondary-link">Terug naar home</a>
      </div>
    </div>
  </div>

  <script>
    // Show which product was purchased if session_id is in URL
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');
    if (sessionId) {
      // Could fetch session details here if needed
      console.log('Stripe session:', sessionId);
    }
  </script>
</body>
</html>
