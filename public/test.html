<!DOCTYPE html>
<html>
<head>
  <title>Deployment Test</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #f5f5f5; }
    .test { margin: 20px 0; padding: 15px; background: white; border-radius: 8px; border-left: 4px solid #ccc; }
    .test.pass { border-left-color: #0a0; background: #f0fff0; }
    .test.fail { border-left-color: #a00; background: #fff0f0; }
    .test.pending { border-left-color: #aaa; background: #f9f9f9; }
    code { background: #eee; padding: 2px 6px; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>Permit Intelligence Platform — Deployment Test</h1>

  <div class="test pending">
    <strong>Static Files:</strong> This test page loaded ✓
  </div>

  <div class="test pending" id="health-test">
    <strong>API Health Check:</strong> Testing <code>GET /api/health</code>...
  </div>

  <div class="test pending" id="register-test">
    <strong>Auth Register:</strong> Testing <code>POST /api/auth/register</code>...
  </div>

  <div class="test pending" id="timeline-test">
    <strong>Timeline Prediction:</strong> Testing <code>POST /api/predict-timeline</code>...
  </div>

  <script>
    async function runTests() {
      // Test 1: Health check
      try {
        const res = await fetch('/api/health');
        if (res.ok) {
          const data = await res.json();
          document.getElementById('health-test').className = 'test pass';
          document.getElementById('health-test').innerHTML = `<strong>API Health Check:</strong> ✓ OK — ${JSON.stringify(data)}`;
        } else {
          throw new Error(`HTTP ${res.status}`);
        }
      } catch (err) {
        document.getElementById('health-test').className = 'test fail';
        document.getElementById('health-test').innerHTML = `<strong>API Health Check:</strong> ✗ Failed — ${err.message}`;
      }

      // Test 2: Register endpoint
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: 'test@test.com', password: 'test123' })
        });
        if (res.status === 201 || res.status === 400) {
          document.getElementById('register-test').className = 'test pass';
          document.getElementById('register-test').innerHTML = `<strong>Auth Register:</strong> ✓ Endpoint reached (HTTP ${res.status})`;
        } else {
          throw new Error(`HTTP ${res.status}`);
        }
      } catch (err) {
        document.getElementById('register-test').className = 'test fail';
        document.getElementById('register-test').innerHTML = `<strong>Auth Register:</strong> ✗ Failed — ${err.message}`;
      }

      // Test 3: Timeline prediction
      try {
        const res = await fetch('/api/predict-timeline', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ municipality: 'Amsterdam', projectType: 'residential' })
        });
        if (res.ok) {
          document.getElementById('timeline-test').className = 'test pass';
          document.getElementById('timeline-test').innerHTML = `<strong>Timeline Prediction:</strong> ✓ Working`;
        } else {
          throw new Error(`HTTP ${res.status}`);
        }
      } catch (err) {
        document.getElementById('timeline-test').className = 'test fail';
        document.getElementById('timeline-test').innerHTML = `<strong>Timeline Prediction:</strong> ✗ Failed — ${err.message}`;
      }
    }

    setTimeout(runTests, 1000);
  </script>
</body>
</html>
